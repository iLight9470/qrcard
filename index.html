<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
<!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Reset some default styles and set box-sizing to border-box for all elements */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* Set the body to use the Outfit font, a light blue background, and center the content */
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #daebff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    /* Style the QR card with a white background, rounded corners, shadow, padding, and centered text */
    .qr-card {
      max-width: 320px;
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
      padding: 1rem 1rem 2.5rem 1rem;
      text-align: center;
    }

    /* QR Code Image Styling */
    img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
    }
    /* Heading Styling */
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a2a6c;
      margin: 1.2rem 0.5rem 0.8rem 0.5rem;
    }
    /* Paragraph Styling */
    p {
      font-size: 0.95rem;
      font-weight: 400;
      color: #7b879d;
      margin: 0 1rem;
      line-height: 1.4;
      letter-spacing: 0.3px;
    }
  </style>

  <title>Frontend Mentor | QR code component</title>

</head>
<body>
  <!-- QR Code Card Component -->
  <div class="qr-card">
    <img src="./images/image-qr-code.png" alt="QR Code">
    <h1>Improve your front-end skills by building projects</h1>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>

  
  
</body>
</html>
